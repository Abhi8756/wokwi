# Mosquitto MQTT Broker Configuration
# For IoT Manhole Monitoring System

# Network Settings
listener 1883
protocol mqtt

# Allow anonymous connections (for development)
# In production, use authentication
allow_anonymous true

# Logging
log_dest stdout
log_type all

# Persistence
persistence true
persistence_location /mosquitto/data/

# Connection settings
max_connections -1
max_queued_messages 1000

# Message size limits
message_size_limit 0

# Keepalive settings
max_keepalive 65535

# Queue settings
max_queued_bytes 0
